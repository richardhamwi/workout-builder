.ph-desc { font-size: 12px; color: var(--muted2); line-height: 1.55; }

// ── Layout ─────────────────────────────────────────────────────────────────
const NW = 124, NH = 44, PAD_X = 80, PAD_Y = 36, MIN_SVG_W = 1180

function layout() {
  const wrap = document.getElementById('graph-wrap')
  const svgW = Math.max(wrap.clientWidth - 1, MIN_SVG_W)

  const byLayer = {}
  nodes.forEach(n => { (byLayer[n.layer] = byLayer[n.layer] || []).push(n) })

  Object.entries(byLayer).forEach(([li, ns]) => {
    const usable = svgW - PAD_X * 2
    const step = usable / ns.length
    ns.forEach((n, i) => {
      n.x = PAD_X + step * i + (step - NW) / 2
      n.y = LAYERS[+li].y
    })
  })

  const lastY = LAYERS[LAYERS.length - 1].y
  const svgH = lastY + NH + PAD_Y + 16

  const svg = document.getElementById('graph')
  svg.setAttribute('width', svgW)
  svg.setAttribute('height', svgH)
  return { svgW, svgH }
}

// ── State ──────────────────────────────────────────────────────────────────
let sel = null

function byId(id) { return nodes.find(n => n.id === id) }
function connectedEdges(id) { return edges.filter(e => e.from === id || e.to === id) }
function neighbors(id) {
  const s = new Set()
  connectedEdges(id).forEach(e => { s.add(e.from); s.add(e.to) })
  s.delete(id)
  return s
}

// ── Render ─────────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg'
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag)
  Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v))
  return e
}

function bezier(a, b) {
  const ax = a.x + NW / 2, ay = a.y + NH
  const bx = b.x + NW / 2, by = b.y
  const my = ay + (by - ay) * 0.48
  return `M ${ax} ${ay} C ${ax} ${my}, ${bx} ${my}, ${bx} ${by}`
}

function render() {
  const { svgW } = layout()
  const svg = document.getElementById('graph')
  svg.innerHTML = ''

  // Defs — arrowhead markers
  const defs = el('defs')
  LAYERS.forEach(lr => {
    ;[['', lr.stroke, 0.55], ['-hi', '#fff', 1], ['-nb', lr.stroke, 0.35]].forEach(([sfx, color, op]) => {
      const m = el('marker', { id: `arr${lr.id}${sfx}`, markerWidth: 8, markerHeight: 8, refX: 7, refY: 3, orient: 'auto' })
      const p = el('polygon', { points: '0 0, 8 3, 0 6', fill: color, opacity: op })
      m.appendChild(p); defs.appendChild(m)
    })
  })
  svg.appendChild(defs)

  // Layer labels + rules
  LAYERS.forEach(lr => {
    const ry = lr.y - 20
    svg.appendChild(el('line', { x1: 0, y1: ry, x2: svgW, y2: ry, stroke: '#27272a', 'stroke-width': 1 }))
    const t = el('text', { x: 10, y: lr.y - 6, fill: lr.stroke, 'font-size': 9, 'font-weight': 800,
      'letter-spacing': '0.09em', 'font-family': '-apple-system, sans-serif' })
    t.textContent = lr.name.toUpperCase()
    svg.appendChild(t)
  })

  // Determine opacity state
  const nbSet = sel ? neighbors(sel) : new Set()
  const selEdges = sel ? new Set(connectedEdges(sel).map(e => `${e.from}|${e.to}`)) : new Set()

  // Edges
  edges.forEach(e => {
    const a = byId(e.from), b = byId(e.to)
    if (!a || !b) return
    const key = `${e.from}|${e.to}`
    const isHi = sel && selEdges.has(key)
    const isDim = sel && !isHi
    const toLr = LAYERS[b.layer]

    const p = el('path', {
      d: bezier(a, b), fill: 'none',
      stroke: isHi ? '#fff' : toLr.stroke,
      'stroke-width': isHi ? 2.5 : 1.5,
      opacity: isDim ? 0.04 : (sel ? 0.9 : 0.22),
      'marker-end': isHi ? `url(#arr${b.layer}-hi)` : `url(#arr${b.layer}${isDim ? '-nb' : ''})`,
    })
    svg.appendChild(p)
  })

  // Nodes
  nodes.forEach(n => {
    const lr = LAYERS[n.layer]
    const isSelected = sel === n.id
    const isNb = nbSet.has(n.id)
    const dim = sel && !isSelected && !isNb

    const g = el('g', { 'class': 'node-g', opacity: dim ? 0.1 : 1, cursor: 'pointer', 'data-id': n.id })

    // Selection / neighbor ring
    if (isSelected) {
      g.appendChild(el('rect', { x: n.x - 5, y: n.y - 5, width: NW + 10, height: NH + 10, rx: 12,
        fill: 'none', stroke: '#fff', 'stroke-width': 2, opacity: 0.55 }))
    } else if (isNb && sel) {
      g.appendChild(el('rect', { x: n.x - 3, y: n.y - 3, width: NW + 6, height: NH + 6, rx: 11,
        fill: 'none', stroke: lr.stroke, 'stroke-width': 1.5, opacity: 0.6 }))
    }

    // Node body
    g.appendChild(el('rect', { x: n.x, y: n.y, width: NW, height: NH, rx: 8,
      fill: isSelected ? lr.stroke : lr.fill,
      stroke: lr.stroke, 'stroke-width': isSelected ? 0 : 1, 'stroke-opacity': 0.55 }))

    // Label
    const lbl = el('text', { x: n.x + NW / 2, y: n.y + (n.sub ? 16 : 23), 'text-anchor': 'middle',
      fill: isSelected ? '#fff' : lr.text, 'font-size': 11, 'font-weight': 700,
      'font-family': "'SF Mono','Fira Code','Cascadia Code',monospace" })
    lbl.textContent = n.label
    g.appendChild(lbl)

    if (n.sub) {
      const sub = el('text', { x: n.x + NW / 2, y: n.y + 31, 'text-anchor': 'middle',
        fill: isSelected ? 'rgba(255,255,255,0.65)' : lr.stroke, 'font-size': 9,
        'font-family': '-apple-system, sans-serif', opacity: 0.75 })
      sub.textContent = n.sub
      g.appendChild(sub)
    }

    // Invisible hit target (full node)
    const hit = el('rect', { x: n.x, y: n.y, width: NW, height: NH, rx: 8,
      fill: 'transparent', 'class': 'node-hit' })
    g.appendChild(hit)

    g.addEventListener('click', ev => {
      ev.stopPropagation()
      sel = sel === n.id ? null : n.id
      render(); updatePanel()
    })

    svg.appendChild(g)
  })

}

// ── Panel ──────────────────────────────────────────────────────────────────
function updatePanel() {
  const empty = document.getElementById('panel-empty')
  const content = document.getElementById('panel-content')

  if (!sel) {
    empty.style.display = 'flex'; content.style.display = 'none'; return
  }
  empty.style.display = 'none'; content.style.display = 'flex'

  const n = byId(sel)
  const lr = LAYERS[n.layer]
  const lnames = ['Page', 'API Route', 'Library', 'External']

  const up   = edges.filter(e => e.to   === sel).map(e => ({ n: byId(e.from), e })).filter(x => x.n)
  const down = edges.filter(e => e.from === sel).map(e => ({ n: byId(e.to),   e })).filter(x => x.n)

  const connHTML = ({ n: cn, e }) => {
    const cl = LAYERS[cn.layer]
    return `<div class="conn" onclick="selectNode('${cn.id}')">
      <div class="conn-dot" style="background:${cl.stroke}"></div>
      <span class="conn-label" style="color:${cl.text}">${cn.label}</span>
      <span class="conn-edge">${e.label}</span>
    </div>`
  }

  content.innerHTML = `
    <div class="ph">
      <div class="ph-badge" style="background:${lr.badge};color:${lr.text}">${lnames[n.layer]}</div>
      <div class="ph-name" style="color:${lr.text}">${n.sub || n.label}</div>
      <div class="ph-desc">${n.desc}</div>
    </div>
    ${up.length ? `<div class="ps">
      <div class="ps-title">Called by &nbsp;(${up.length})</div>
      ${up.map(connHTML).join('')}
    </div>` : ''}
    ${down.length ? `<div class="ps">
      <div class="ps-title">Calls &nbsp;(${down.length})</div>
      ${down.map(connHTML).join('')}
    </div>` : ''}
    ${n.details?.length ? `<div class="ps">
      <div class="ps-title">Details</div>
      <ul class="detail-list">${n.details.map(d => `<li>${d}</li>`).join('')}</ul>
    </div>` : ''}
  `
}

window.selectNode = id => { sel = id; render(); updatePanel() }

// ── Background click → deselect ────────────────────────────────────────────
document.getElementById('graph').addEventListener('click', () => {
  sel = null; render(); updatePanel()
})

// ── Keyboard + Resize ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { sel = null; render(); updatePanel() }
})

let resizeT
window.addEventListener('resize', () => {
  clearTimeout(resizeT)
  resizeT = setTimeout(() => { render(); updatePanel() }, 80)
})

// ── Boot ───────────────────────────────────────────────────────────────────
render()
updatePanel()
</script>
</body>
</html>
